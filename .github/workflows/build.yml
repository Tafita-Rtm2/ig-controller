name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Generate debug keystore
        run: keytool -genkeypair -v -keystore app/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
      - name: Build APK
        run: ./gradlew assembleRelease --stacktrace 2>&1 || true

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null || echo "Aucun APK trouve"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IGController-APK
          path: app/build/outputs/apk/
          if-no-files-found: warn
